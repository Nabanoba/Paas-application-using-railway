<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background-color: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        a.button {
            text-decoration: none;
            color: white;
            background-color: #4CAF50;
            padding: 6px 12px;
            border-radius: 5px;
            margin-right: 5px;
        }
        a.button.delete {
            background-color: #f44336;
        }
        a.button:hover {
            opacity: 0.8;
        }
        .add-task {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background-color: #2196F3;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .add-task:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Tasks</h1>
    <a href="/add" class="add-task">Add New Task</a>
    <table>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.status }}</td>
            <td>
                <a href="/edit/{{ task.id }}" class="button">Edit</a>
                <a href="/delete/{{ task.id }}" class="button delete">Delete</a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3" style="text-align:center;">No tasks yet</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
